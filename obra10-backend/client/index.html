  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="color:red; font-size: 20px; z-index:9999; position:absolute; top:0; left:0; background:white; padding:20px; word-wrap: break-word;">' + (event.error?.stack || event.message) + '</div>';
        
        // Auto-fix PWA Cache issues on ANY error in localhost
        if (window.location.hostname === 'localhost') {
           navigator.serviceWorker.getRegistrations().then(regs => {
              regs.forEach(r => r.unregister());
              caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
                sessionStorage.setItem('sw_cleared', '1');
                window.location.reload();
              });
           });
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red; font-size: 20px; z-index:9999; position:absolute; top:0; left:0; background:white; padding:20px; word-wrap: break-word;">' + (event.reason?.stack || event.reason) + '</div>';
      });
      
      // Auto clears once if needed
      if(sessionStorage.getItem('sw_cleared') === '1') {
         sessionStorage.removeItem('sw_cleared');
         console.warn('SW cleared. Retrying load...');
      }
    </script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator && window.location.hostname !== 'localhost') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
